<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2300" viewBox="0 0 1600 2300" role="img" aria-labelledby="title desc">
  <title id="title">Infografia funcional avanzada de CaptionFlow</title>
  <desc id="desc">Infografia que explica para que sirve CaptionFlow, como funciona su flujo operativo y que obtiene un usuario funcional avanzado.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .ink { fill: #162033; }
      .muted { fill: #5f6b7a; }
      .soft { fill: #edf2f7; }
      .card { fill: #ffffff; stroke: #dbe4ef; stroke-width: 2; }
      .panel { fill: #ffffff; stroke: #cfdbe8; stroke-width: 2.4; }
      .blue { fill: #2563eb; }
      .teal { fill: #0f8f7c; }
      .green { fill: #178245; }
      .amber { fill: #c77700; }
      .red { fill: #d3423f; }
      .purple { fill: #7c3aed; }
      .navy { fill: #20324d; }
      .line { stroke: #91a4b8; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #91a4b8; stroke-width: 4; fill: none; stroke-linecap: round; stroke-dasharray: 10 13; }
      .white { fill: #ffffff; }
      .tag { fill: #eef4ff; stroke: #c9d8ff; stroke-width: 1.5; }
      .tagText { fill: #2451b2; font: 600 25px Arial, Helvetica, sans-serif; }
      .h1 { font: 800 68px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h2 { font: 800 38px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .h3 { font: 800 29px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .body { font: 400 25px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .body2 { font: 400 23px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .small { font: 400 20px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .smallBold { font: 700 20px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .num { font: 800 32px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .mono { font: 600 22px Consolas, Monaco, monospace; letter-spacing: 0; }
      .shadow { filter: drop-shadow(0 12px 22px rgba(25, 39, 64, 0.10)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#91a4b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="2300"/>

  <!-- Header -->
  <rect x="70" y="60" width="1460" height="250" rx="22" class="navy shadow"/>
  <circle cx="185" cy="185" r="70" fill="#ffffff" opacity="0.12"/>
  <path d="M155 162 h58 a24 24 0 0 1 0 48 h-58 a24 24 0 0 1 0-48 z" fill="#ffffff" opacity="0.92"/>
  <path d="M184 174 l34 12 -34 13 z" class="blue"/>
  <text x="290" y="150" class="h1 white">CaptionFlow</text>
  <text x="292" y="205" class="h2" fill="#dbeafe">De video de YouTube a conocimiento accionable</text>
  <text x="292" y="252" class="body" fill="#e9eef8">Infografia para usuario funcional avanzado: uso, decisiones, flujo y entregables.</text>
  <rect x="1190" y="103" width="260" height="58" rx="29" fill="#ffffff" opacity="0.14"/>
  <text x="1230" y="140" class="smallBold" fill="#ffffff">App local + IA</text>
  <rect x="1190" y="178" width="260" height="58" rx="29" fill="#ffffff" opacity="0.14"/>
  <text x="1224" y="215" class="smallBold" fill="#ffffff">React + Express</text>

  <!-- Purpose -->
  <text x="90" y="390" class="h2 ink">1. Para que sirve</text>
  <rect x="70" y="425" width="460" height="250" rx="16" class="card shadow"/>
  <circle cx="130" cy="495" r="34" class="blue"/>
  <text x="118" y="506" class="num">1</text>
  <text x="180" y="490" class="h3 ink">Ahorrar tiempo</text>
  <text x="180" y="532" class="body2 muted">Transforma horas de video en</text>
  <text x="180" y="565" class="body2 muted">resumenes estructurados,</text>
  <text x="180" y="598" class="body2 muted">puntos clave y documentos.</text>

  <rect x="570" y="425" width="460" height="250" rx="16" class="card shadow"/>
  <circle cx="630" cy="495" r="34" class="teal"/>
  <path d="M613 492 l13 13 27-32" stroke="#fff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="680" y="490" class="h3 ink">Estandarizar analisis</text>
  <text x="680" y="532" class="body2 muted">Cada prompt define el criterio:</text>
  <text x="680" y="565" class="body2 muted">resumen claro, ejecutivo,</text>
  <text x="680" y="598" class="body2 muted">paso a paso o critico.</text>

  <rect x="1070" y="425" width="460" height="250" rx="16" class="card shadow"/>
  <circle cx="1130" cy="495" r="34" class="purple"/>
  <path d="M1114 512 h32 v-42 h-32 z M1122 486 h16 M1122 499 h16" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round"/>
  <text x="1180" y="490" class="h3 ink">Convertir en entregables</text>
  <text x="1180" y="532" class="body2 muted">Genera Markdown, PDF,</text>
  <text x="1180" y="565" class="body2 muted">diagramas Mermaid e historial</text>
  <text x="1180" y="598" class="body2 muted">consultable por trabajo.</text>

  <!-- User workflow -->
  <text x="90" y="770" class="h2 ink">2. Flujo funcional de usuario</text>
  <rect x="70" y="805" width="1460" height="430" rx="18" class="panel shadow"/>

  <line x1="205" y1="1015" x2="1395" y2="1015" class="line" marker-end="url(#arrow)"/>
  <g>
    <circle cx="205" cy="1015" r="56" class="blue"/>
    <text x="195" y="1027" class="num">1</text>
    <text x="130" y="890" class="h3 ink">Pegar URL</text>
    <text x="98" y="935" class="small muted">YouTube como origen</text>
    <text x="106" y="965" class="small muted">del contenido.</text>
  </g>
  <g>
    <circle cx="445" cy="1015" r="56" class="teal"/>
    <text x="435" y="1027" class="num">2</text>
    <text x="365" y="1110" class="h3 ink">Elegir prompt</text>
    <text x="352" y="1154" class="small muted">Define la pregunta</text>
    <text x="352" y="1184" class="small muted">y el formato deseado.</text>
  </g>
  <g>
    <circle cx="685" cy="1015" r="56" class="amber"/>
    <text x="675" y="1027" class="num">3</text>
    <text x="610" y="890" class="h3 ink">Procesar</text>
    <text x="575" y="935" class="small muted">Validacion, subtitulos,</text>
    <text x="585" y="965" class="small muted">cache y llamada IA.</text>
  </g>
  <g>
    <circle cx="925" cy="1015" r="56" class="purple"/>
    <text x="915" y="1027" class="num">4</text>
    <text x="840" y="1110" class="h3 ink">Revisar salida</text>
    <text x="825" y="1154" class="small muted">Resultado renderizado</text>
    <text x="844" y="1184" class="small muted">en Markdown.</text>
  </g>
  <g>
    <circle cx="1165" cy="1015" r="56" class="green"/>
    <text x="1155" y="1027" class="num">5</text>
    <text x="1080" y="890" class="h3 ink">Ampliar</text>
    <text x="1050" y="935" class="small muted">Diagrama, prompt usado</text>
    <text x="1080" y="965" class="small muted">o transcripcion.</text>
  </g>
  <g>
    <circle cx="1405" cy="1015" r="56" class="red"/>
    <text x="1395" y="1027" class="num">6</text>
    <text x="1320" y="1110" class="h3 ink">Exportar</text>
    <text x="1292" y="1154" class="small muted">Descarga MD/PDF y</text>
    <text x="1327" y="1184" class="small muted">reusa historial.</text>
  </g>

  <!-- Decision points -->
  <text x="90" y="1325" class="h2 ink">3. Decisiones que controla el usuario funcional</text>
  <rect x="70" y="1360" width="700" height="380" rx="18" class="panel shadow"/>
  <text x="112" y="1425" class="h3 ink">Antes de procesar</text>
  <rect x="112" y="1460" width="245" height="48" rx="24" class="tag"/>
  <text x="135" y="1492" class="tagText">Proveedor IA</text>
  <rect x="382" y="1460" width="245" height="48" rx="24" class="tag"/>
  <text x="423" y="1492" class="tagText">Modelo</text>
  <rect x="112" y="1530" width="245" height="48" rx="24" class="tag"/>
  <text x="151" y="1562" class="tagText">Prompt</text>
  <rect x="382" y="1530" width="245" height="48" rx="24" class="tag"/>
  <text x="418" y="1562" class="tagText">Prompt propio</text>
  <text x="112" y="1630" class="body2 muted">Estas decisiones cambian el objetivo,</text>
  <text x="112" y="1664" class="body2 muted">el coste en tokens, la profundidad del</text>
  <text x="112" y="1698" class="body2 muted">analisis y el estilo del entregable.</text>

  <rect x="830" y="1360" width="700" height="380" rx="18" class="panel shadow"/>
  <text x="872" y="1425" class="h3 ink">Despues de procesar</text>
  <rect x="872" y="1460" width="245" height="48" rx="24" class="tag"/>
  <text x="917" y="1492" class="tagText">Diagrama</text>
  <rect x="1142" y="1460" width="245" height="48" rx="24" class="tag"/>
  <text x="1209" y="1492" class="tagText">PDF</text>
  <rect x="872" y="1530" width="245" height="48" rx="24" class="tag"/>
  <text x="915" y="1562" class="tagText">Copiar MD</text>
  <rect x="1142" y="1530" width="245" height="48" rx="24" class="tag"/>
  <text x="1183" y="1562" class="tagText">Historial</text>
  <text x="872" y="1630" class="body2 muted">El usuario puede convertir el resultado</text>
  <text x="872" y="1664" class="body2 muted">en documentacion, explicacion visual o</text>
  <text x="872" y="1698" class="body2 muted">evidencia reutilizable sin repetir trabajo.</text>

  <!-- Under the hood -->
  <text x="90" y="1830" class="h2 ink">4. Que ocurre por debajo</text>
  <rect x="70" y="1865" width="1460" height="300" rx="18" class="panel shadow"/>
  <rect x="115" y="1925" width="285" height="170" rx="14" fill="#eef4ff" stroke="#c9d8ff" stroke-width="2"/>
  <text x="145" y="1978" class="h3 ink">Frontend</text>
  <text x="145" y="2020" class="body2 muted">React + Vite</text>
  <text x="145" y="2054" class="small muted">Interfaz, formularios,</text>
  <text x="145" y="2084" class="small muted">historial y vista previa.</text>

  <path d="M420 2010 h110" class="line" marker-end="url(#arrow)"/>
  <rect x="555" y="1925" width="285" height="170" rx="14" fill="#ecfdf5" stroke="#bfead3" stroke-width="2"/>
  <text x="585" y="1978" class="h3 ink">Backend</text>
  <text x="585" y="2020" class="body2 muted">Node.js + Express</text>
  <text x="585" y="2054" class="small muted">Valida, orquesta jobs,</text>
  <text x="585" y="2084" class="small muted">protege API keys.</text>

  <path d="M860 2010 h110" class="line" marker-end="url(#arrow)"/>
  <rect x="995" y="1925" width="285" height="170" rx="14" fill="#fff7ed" stroke="#f3d19c" stroke-width="2"/>
  <text x="1025" y="1978" class="h3 ink">Extractor</text>
  <text x="1025" y="2020" class="body2 muted">yt-dlp local</text>
  <text x="1025" y="2054" class="small muted">Obtiene captions y</text>
  <text x="1025" y="2084" class="small muted">reutiliza cache local.</text>

  <path d="M1288 2010 h85" class="line" marker-end="url(#arrow)"/>
  <rect x="1395" y="1925" width="90" height="170" rx="14" class="purple"/>
  <text x="1420" y="1990" class="smallBold white">IA</text>
  <text x="1410" y="2026" class="small white">API</text>
  <text x="1414" y="2062" class="small white">LLM</text>

  <line x1="1138" y1="2110" x2="1138" y2="2185" class="dash" marker-end="url(#arrow)"/>
  <rect x="895" y="2188" width="486" height="64" rx="32" fill="#ffffff" stroke="#dbe4ef" stroke-width="2"/>
  <text x="930" y="2228" class="mono muted">output/transcripts + output/results</text>

  <!-- Functional insight -->
  <rect x="70" y="1785" width="1460" height="1" fill="#d8e2ee"/>
  <rect x="1010" y="1747" width="520" height="76" rx="38" fill="#fff7ed" stroke="#f3d19c" stroke-width="2"/>
  <text x="1055" y="1795" class="smallBold" fill="#945b00">Idea clave: captions sin IA; sintesis y diagramas con IA.</text>

  <!-- Footer -->
  <rect x="70" y="2215" width="1460" height="55" rx="12" fill="#e9eef8"/>
  <text x="105" y="2251" class="small muted">CaptionFlow convierte contenido audiovisual en activos reutilizables: resumen, analisis, diagrama, PDF, transcripcion e historial.</text>
</svg>
